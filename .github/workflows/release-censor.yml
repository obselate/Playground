name: release-censor

# Cross-platform binary release for `censor`.
#
# Triggered by pushing a tag matching `censor-v<version>` (e.g.
# `censor-v0.2.0`). Produces four archives — Linux x86_64, macOS
# x86_64 (Intel), macOS aarch64 (Apple Silicon), Windows x86_64 — and
# attaches them to a GitHub Release. The release is auto-created by
# softprops/action-gh-release on the first upload; subsequent matrix
# jobs append to the same release.

on:
  push:
    tags:
      - 'censor-v*'

permissions:
  contents: write

jobs:
  build-release:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive-ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive-ext: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive-ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive-ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: censor

      - name: cargo build --release
        working-directory: censor
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: stage archive
        shell: bash
        working-directory: censor
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#censor-v}"
          name="censor-${version}-${{ matrix.target }}"
          mkdir -p "staging/${name}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/censor.exe" "staging/${name}/"
          else
            cp "target/${{ matrix.target }}/release/censor" "staging/${name}/"
          fi
          cp README.md "staging/${name}/"
          cp ../LICENSE "staging/${name}/"
          cd staging
          if [[ "${{ matrix.archive-ext }}" == "zip" ]]; then
            # Windows runners ship 7z; use it for deterministic zips.
            7z a "${name}.zip" "${name}"
          else
            tar czf "${name}.tar.gz" "${name}"
          fi
          echo "ARCHIVE_PATH=censor/staging/${name}.${{ matrix.archive-ext }}" >>"$GITHUB_ENV"

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_PATH }}
          fail_on_unmatched_files: true
          generate_release_notes: true
