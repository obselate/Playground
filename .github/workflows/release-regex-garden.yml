name: release-regex-garden

# Python sdist + wheel release for `regex-garden`.
#
# Triggered by pushing a tag matching `regex-garden-v<version>` (e.g.
# `regex-garden-v0.2.0`). Builds a source distribution and a pure-Python
# wheel, then attaches them to a GitHub Release. No PyPI publish step
# yet; users can `pip install` the wheel or tarball directly from the
# release assets. A future follow-up can add PyPI trusted-publishing
# once the project owns an account.

on:
  push:
    tags:
      - 'regex-garden-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install build tool
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: build sdist + wheel
        working-directory: regex-garden
        run: python -m build

      - name: list artifacts
        run: ls -la regex-garden/dist/

      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: regex-garden/dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
