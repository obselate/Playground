name: regex-garden

on:
  push:
    paths:
      - 'regex-garden/**'
      - '.github/workflows/regex-garden.yml'
  pull_request:
    paths:
      - 'regex-garden/**'
      - '.github/workflows/regex-garden.yml'

jobs:
  test:
    name: test (py${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12']

    defaults:
      run:
        working-directory: regex-garden

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: install package + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: pytest
        run: python -m pytest -q
